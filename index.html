<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Koi Mosaic Lab</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0b131a;
            user-select: none;
            font-family: monospace;
            color: #e2e8f0;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        #config-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 340px;
            height: 100vh;
            background: rgba(11, 19, 26, 0.95);
            border-right: 1px solid #1e293b;
            padding: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            box-sizing: border-box;
            /* --- ADD THIS LINE FOR ANIMATION --- */
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- ADD THESE TWO NEW BLOCKS RIGHT BELOW #config-view --- */
        #config-view.collapsed {
            transform: translateX(-100%);
        }

        #config-view.collapsed+#toggle-btn {
            left: 0px;
        }

        #toggle-btn {
            position: absolute;
            top: 20px;
            left: 340px;
            transition: left 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            top: 20px;
            right: -36px;
            width: 36px;
            height: 36px;
            background: rgba(11, 19, 26, 0.95);
            border: 1px solid #1e293b;
            border-left: none;
            color: #38bdf8;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 6px 6px 0;
            z-index: 101;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.3);
            outline: none;
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            color: #38bdf8;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            cursor: pointer;
        }

        .checkbox-group input {
            cursor: pointer;
            width: 14px;
            height: 14px;
        }

        .param-timeline-block {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .block-header {
            font-size: 11px;
            font-weight: bold;
            color: #f1f5f9;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .curve-selector-row {
            display: flex;
            gap: 4px;
        }

        .curve-btn {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 4px 2px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            font-family: monospace;
            text-align: center;
        }

        .curve-btn.active {
            background: #0284c7;
            border-color: #38bdf8;
            color: #ffffff;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .input-subfield {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .input-subfield label {
            font-size: 8px;
            color: #64748b;
            text-transform: uppercase;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            background: #090d16;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 5px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 11px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            font-size: 10px;
            color: #94a3b8;
        }

        .slider-label span:last-child {
            font-weight: bold;
            color: #38bdf8;
        }

        input[type="range"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 4px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .color-picker-row {
            display: flex;
            gap: 10px;
        }

        .color-picker-row .slider-group {
            flex: 1;
        }

        input[type="color"] {
            width: 100%;
            height: 32px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px;
            box-sizing: border-box;
        }

        .btn-generate {
            background: #0284c7;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
            font-family: monospace;
        }

        .btn-generate:hover {
            background: #0369a1;
        }

        body.exhibition-mode #config-view {
            display: none !important;
        }

        body.exhibition-mode #toggle-btn {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="config-view">

        <div class="section-title">Canvas Target Source</div>

        <div class="slider-group">
            <label class="slider-label">Source Mode</label>
            <select id="asset-mode-select">
                <option value="image">Raster Image URL Only</option>
                <option value="text">Typography Vector Text Only</option>
                <option value="composite">Image Backdrop + Typography Text</option>
            </select>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="check-randomSpawn">
            <label for="check-randomSpawn">Randomize Spawn Locations</label>
        </div>

        <div id="input-container-image" class="slider-group">
            <label class="slider-label">Image Target URL</label>
            <input type="text" id="input-image-url" placeholder="https://example.com/art.jpg">
        </div>
        <div id="bg-density-group" class="slider-group">
            <div class="slider-label"><span>Background Fish Count</span><span id="val-bgCount">1200</span></div>
            <input type="range" id="slide-bgCount" min="100" max="3000" step="50" value="1200">
        </div>
        <div id="bg-scale-group" class="slider-group">
            <div class="slider-label"><span>Background Fish Scale</span><span id="val-bgScale">0.38</span></div>
            <input type="range" id="slide-bgScale" min="0.1" max="1.0" step="0.02" value="0.38">
        </div>

        <div id="typography-controls-wrapper" style="display: none; flex-direction: column; gap: 14px;">
            <div class="slider-group" id="input-container-text">
                <label class="slider-label">Text (Use \n for line breaks)</label>
                <input type="text" id="input-text-string" placeholder="HELLO\nWORLD" maxlength="40">
            </div>
            <div id="text-size-group" class="slider-group">
                <div class="slider-label"><span>Text Font Size Modifier</span><span id="val-fontSize">1.00</span></div>
                <input type="range" id="slide-fontSize" min="0.3" max="2.5" step="0.05" value="1.00">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>Foreground Text Fish Count</span><span id="val-fgCount">600</span></div>
                <input type="range" id="slide-fgCount" min="50" max="2500" step="50" value="600">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>Foreground Text Fish Scale</span><span id="val-fgScale">0.22</span>
                </div>
                <input type="range" id="slide-fgScale" min="0.1" max="1.0" step="0.02" value="0.22">
            </div>
            <div class="slider-group" id="text-color-mode-container">
                <label class="slider-label">Text Color Mode</label>
                <select id="text-color-style-select">
                    <option value="koi">Authentic Pattern Koi</option>
                    <option value="gradient">Linear Gradient Flow</option>
                </select>
            </div>
            <div class="color-picker-row" id="text-gradient-pickers" style="display: none;">
                <div class="slider-group">
                    <label class="slider-label">Grad Left</label>
                    <input type="color" id="picker-grad-start" value="#ff7700">
                </div>
                <div class="slider-group">
                    <label class="slider-label">Grad Right</label>
                    <input type="color" id="picker-grad-end" value="#00bfff">
                </div>
            </div>
        </div>

        <div class="section-title">Parametric Timeline Tracks</div>

        <div id="timeline-sequencer-container" style="display: flex; flex-direction: column; gap: 10px;"></div>

        <button class="btn-generate" id="btn-generate-url">Share Exhibition</button>
    </div>

    <button id="toggle-btn" title="Toggle Configuration">◀</button>
    <canvas id="pond"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('m') || window.location.search.length > 1) {
            document.body.classList.add('exhibition-mode');
        }
        const parametersDef = [
            {key: "visualRange", label: "Visual Range", base: 45.0, step: 1.0},
            {key: "protectedRange", label: "Protected Range", base: 20.0, step: 1.0},
            {key: "separationWeight", label: "Separation Weight", base: 1.60, step: 0.05},
            {key: "alignmentWeight", label: "Alignment Weight", base: 0.60, step: 0.05},
            {key: "cohesionWeight", label: "Cohesion Weight", base: 1.35, step: 0.05},
            {key: "maxSpeed", label: "Max Speed", base: 8.0, step: 0.5},
            {key: "minSpeed", label: "Min Speed", base: 3.0, step: 0.5},
            {key: "affinityStrength", label: "Color Affinity", base: 50.0, step: 1.0},
            {key: "mosaicFocus", label: "Mosaic Focus", base: 0.0, step: 1.0}
        ];

        const container = document.getElementById('timeline-sequencer-container');

        parametersDef.forEach(p => {
            const block = document.createElement('div');
            block.className = 'param-timeline-block';
            block.id = `block-${p.key}`;
            block.innerHTML = `
                <div class="block-header">
                    <span>${p.label}</span>
                    <span id="live-val-${p.key}" style="color: #38bdf8; font-weight: bold;">${p.base}</span>
                </div>
                <div class="curve-selector-row">
                    <button class="curve-btn active" id="btn-${p.key}-none" onclick="setTrackCurve('${p.key}', 'none')">Static</button>
                    <button class="curve-btn" id="btn-${p.key}-linear" onclick="setTrackCurve('${p.key}', 'linear')">Lin</button>
                    <button class="curve-btn" id="btn-${p.key}-cubic" onclick="setTrackCurve('${p.key}', 'cubic')">Cub</button>
                    <button class="curve-btn" id="btn-${p.key}-exponential" onclick="setTrackCurve('${p.key}', 'exponential')">Exp</button>
                </div>
                <div class="inputs-grid">
                    <div class="input-subfield">
                        <label id="lbl-${p.key}-start">Constant</label>
                        <input type="number" id="input-${p.key}-start" step="${p.step}" value="${p.base}">
                    </div>
                    <div class="input-subfield" id="field-${p.key}-end" style="display: none;">
                        <label>End Val</label>
                        <input type="number" id="input-${p.key}-end" step="${p.step}" value="${p.base}">
                    </div>
                    <div class="input-subfield" id="field-${p.key}-dur" style="display: none;">
                        <label>Time (s)</label>
                        <input type="number" id="input-${p.key}-dur" min="0.1" step="0.1" value="4.0">
                    </div>
                </div>
                <input type="hidden" id="cache-${p.key}-curve" value="none">
            `;
            container.appendChild(block);
        });

        window.setTrackCurve = function (key, curveType) {
            const block = document.getElementById(`block-${key}`);
            if (!block) return;
            block.querySelectorAll('.curve-btn').forEach(btn => btn.classList.remove('active'));

            const targetedBtn = document.getElementById(`btn-${key}-${curveType}`);
            if (targetedBtn) targetedBtn.classList.add('active');

            const cacheInput = document.getElementById(`cache-${key}-curve`);
            if (cacheInput) cacheInput.value = curveType;

            const lblStart = document.getElementById(`lbl-${key}-start`);
            const fieldEnd = document.getElementById(`field-${key}-end`);
            const fieldDur = document.getElementById(`field-${key}-dur`);

            if (curveType === 'none') {
                if (lblStart) lblStart.textContent = "Constant";
                if (fieldEnd) fieldEnd.style.display = "none";
                if (fieldDur) fieldDur.style.display = "none";
            } else {
                if (lblStart) lblStart.textContent = "Start Val";
                if (fieldEnd) fieldEnd.style.display = "flex";
                if (fieldDur) fieldDur.style.display = "flex";
            }

            window.dispatchEvent(new CustomEvent('timeline-control-update', {detail: {key, curveType}}));
        };

        const modeSelect = document.getElementById('asset-mode-select');
        const imgContainer = document.getElementById('input-container-image');
        const bgDensityGroup = document.getElementById('bg-density-group');
        const bgScaleGroup = document.getElementById('bg-scale-group');
        const typographyWrapper = document.getElementById('typography-controls-wrapper');
        const styleSelect = document.getElementById('text-color-style-select');
        const gradientPickers = document.getElementById('text-gradient-pickers');

        function synchronizeUIOverlayDisplays() {
            const mode = modeSelect.value;
            imgContainer.style.display = (mode === 'image' || mode === 'composite') ? 'block' : 'none';
            bgDensityGroup.style.display = (mode === 'image' || mode === 'composite') ? 'block' : 'none';
            bgScaleGroup.style.display = (mode === 'image' || mode === 'composite') ? 'block' : 'none';

            typographyWrapper.style.display = (mode === 'text' || mode === 'composite') ? 'flex' : 'none';
            gradientPickers.style.display = ((mode === 'text' || mode === 'composite') && styleSelect.value === 'gradient') ? 'flex' : 'none';
        }

        modeSelect.addEventListener('change', synchronizeUIOverlayDisplays);
        styleSelect.addEventListener('change', synchronizeUIOverlayDisplays);
        window.addEventListener('DOMContentLoaded', synchronizeUIOverlayDisplays);

        ['bgCount', 'bgScale', 'fgCount', 'fgScale', 'fontSize'].forEach(id => {
            const slide = document.getElementById(`slide-${id}`);
            const display = document.getElementById(`val-${id}`);
            if (slide && display) {
                slide.addEventListener('input', (e) => {
                    display.textContent = parseFloat(e.target.value).toFixed(id.includes('Scale') || id === 'fontSize' ? 2 : 0);
                });
            }
        });

        // --- ADD THIS PANEL RETRACTION TOGGLE ENGINE ---
        const toggleBtn = document.getElementById('toggle-btn');
        const configView = document.getElementById('config-view');

        toggleBtn.addEventListener('click', () => {
            configView.classList.toggle('collapsed');
            toggleBtn.textContent = configView.classList.contains('collapsed') ? '▶' : '◀';
        });
    </script>
    <script type="module" src="src/main.ts"></script>
</body>

</html>
